<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>PedroWords</title>
    <link rel="stylesheet" href="style.css">

    <link rel="icon" href="logo.ico" type="image/x-icon">
</head>
<body>
    <header>
        <h1>PedroWords</h1>
    </header>

    <main>
        <div id="grade"></div>

        <form id="formulario" onsubmit="enviar(event)">
            <div id="entrada-div">
                <input type="text" id="entrada" maxlength="5" autocomplete="off" placeholder="Digite 5 letras" required />
                <button type="submit">Enviar</button>
            </div>
        </form>
        
        <br>

        <div id="tentativas"></div>

        <div id="card" class="card">
            <h2 id="palavrac">Palavra correta: </h2>
            <h3 id="status">Você acertou!</h3>
            <p id="tentativac">Tentativas usadas: 0 de 6</p>
            <button type="button" id="reiniciar" onclick="reiniciar()">Jogar novamente</button>
        </div>

    </main>

    <script src="script.js"></script>
</body>
</html>
